# ============================================================
# Superset standalone docker-compose
# (Simplified - can use this instead of the full stack)
# ============================================================
version: '3.8'

services:
  superset:
    image: apache/superset:3.1.1
    container_name: datn_superset
    command: >
      /bin/sh -c "
        superset db upgrade &&
        (superset fab create-admin --username ${SUPERSET_ADMIN_USER} --password ${SUPERSET_ADMIN_PASSWORD} --firstname Admin --lastname User --email ${SUPERSET_ADMIN_EMAIL} || true) &&
        superset init &&
        gunicorn --bind '0.0.0.0:8088' --workers 4 --timeout 120 --access-logfile - --error-logfile - 'superset.app:create_app()'
      "
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=sqlite:////var/lib/superset/superset.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - superset_home:/var/lib/superset
      - ./superset_config.py:/var/lib/superset/superset_config.py:ro
    networks:
      - superset_network

  redis:
    image: redis:7-alpine
    container_name: datn_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - superset_network

networks:
  superset_network:
    driver: bridge

volumes:
  superset_home:
  redis_data:
