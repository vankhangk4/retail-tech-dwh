name: CI — DWH Multi-Tenant

on:
  push:
    branches: [ main, version3, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────
  # 1. Unit Tests (không cần DB)
  # ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        env:
          JWT_SECRET_KEY: 'test-secret-key-minimum-32-chars!!'
          MSSQL_SERVER: localhost
          MSSQL_USER: sa
          MSSQL_PASSWORD: TestPass123!
          MSSQL_DATABASE: DWH_MultiTenant
          SUPERSET_URL: http://localhost:8088
        run: |
          pytest tests/ \
            -v \
            --cov=api \
            --cov=etl \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────
  # 2. Lint & Code Quality
  # ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 api/ etl/ monitoring/ \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303 \
            --exclude=__pycache__,.git

  # ──────────────────────────────────────────
  # 3. Build Docker images
  # ──────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t dwh-api:${{ github.sha }} .

      - name: Build Frontend image
        run: docker build -f frontend/Dockerfile.frontend -t dwh-frontend:${{ github.sha }} ./frontend

  # ──────────────────────────────────────────
  # 4. Integration Test (với MSSQL container)
  # ──────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: TestPass123!
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P TestPass123! -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Wait for MSSQL
        run: |
          for i in {1..20}; do
            if python -c "import pymssql; pymssql.connect('localhost','sa','TestPass123!','master')"; then
              echo "MSSQL ready"; break
            fi
            echo "Waiting... $i"; sleep 5
          done

      - name: Initialize schema
        env:
          MSSQL_SERVER: localhost
          MSSQL_USER: sa
          MSSQL_PASSWORD: TestPass123!
        run: |
          python sql/_read_env_and_build.py || true

      - name: Run all tests
        env:
          JWT_SECRET_KEY: 'test-secret-key-minimum-32-chars!!'
          MSSQL_SERVER: localhost
          MSSQL_USER: sa
          MSSQL_PASSWORD: TestPass123!
          MSSQL_DATABASE: DWH_MultiTenant
          SUPERSET_URL: http://localhost:8088
        run: |
          pytest tests/ -v --tb=short
