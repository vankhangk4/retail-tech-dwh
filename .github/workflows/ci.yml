name: CI - DWH Multi-Tenant

"on":
  push:
    branches: [ main, version3, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────
  # 1. Unit Tests (không cần DB)
  # ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r frontend/requirements_frontend.txt
          pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        env:
          JWT_SECRET_KEY: 'test-secret-key-minimum-32-chars!!'
          MSSQL_SERVER: localhost
          MSSQL_USER: sa
          MSSQL_PASSWORD: TestPass123!
          MSSQL_DATABASE: DWH_MultiTenant
          SUPERSET_URL: http://localhost:8088
        run: |
          pytest tests/ \
            -v \
            --cov=api \
            --cov=etl \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────
  # 2. Critical Python checks
  # ──────────────────────────────────────────
  lint:
    name: Python Syntax / Undefined Names
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run critical flake8 checks
        run: |
          flake8 api/ etl/ frontend/ monitoring/ \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=__pycache__,.git,.venv

  # ──────────────────────────────────────────
  # 3. Build Docker images
  # ──────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ unit-tests, lint ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t dwh-api:${{ github.sha }} .

      - name: Build Frontend image
        run: docker build -f frontend/Dockerfile.frontend -t dwh-frontend:${{ github.sha }} ./frontend

  # ──────────────────────────────────────────
  # 4. Integration Test (với MSSQL container)
  # ──────────────────────────────────────────
  integration-test:
    name: MSSQL Connectivity + Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: TestPass123!
          SA_PASSWORD: TestPass123!
          MSSQL_PID: Developer
        ports:
          - 1433:1433

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r frontend/requirements_frontend.txt
          pip install -r requirements-test.txt

      - name: Wait for MSSQL
        run: |
          python - <<'PY'
          import sys
          import time

          import pymssql

          for attempt in range(1, 31):
              try:
                  conn = pymssql.connect(
                      server='localhost',
                      user='sa',
                      password='TestPass123!',
                      database='master',
                      login_timeout=5,
                      timeout=5,
                  )
                  conn.close()
                  print('MSSQL ready')
                  break
              except Exception as exc:
                  print(f'Waiting for MSSQL ({attempt}/30): {exc}')
                  time.sleep(5)
          else:
              print('MSSQL did not become ready in time', file=sys.stderr)
              sys.exit(1)
          PY

      - name: Run all tests
        env:
          JWT_SECRET_KEY: 'test-secret-key-minimum-32-chars!!'
          MSSQL_SERVER: localhost
          MSSQL_USER: sa
          MSSQL_PASSWORD: TestPass123!
          MSSQL_DATABASE: DWH_MultiTenant
          SUPERSET_URL: http://localhost:8088
        run: |
          pytest tests/ -v --tb=short
