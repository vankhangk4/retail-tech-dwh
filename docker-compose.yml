# ============================================================
# DATN - Data Warehouse & BI System
# Docker Compose: SQL Server 2022 + Superset + Backend
# ============================================================

services:
  # ---- SQL Server 2022 ----
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: datn_mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sqlservr || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - datn_network

  # ---- Superset ----
  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: datn/superset:3.1.1
    container_name: datn_superset
    command: >
      /bin/sh -c "
        superset db upgrade &&
        (superset fab create-admin --username ${SUPERSET_ADMIN_USER} --password ${SUPERSET_ADMIN_PASSWORD} --firstname Admin --lastname User --email ${SUPERSET_ADMIN_EMAIL} || true) &&
        superset init &&
        gunicorn --bind '0.0.0.0:8088' --workers 4 --timeout 120 --access-logfile - --error-logfile - 'superset.app:create_app()'
      "
    environment:
      - SUPERSET_CONFIG_PATH=/var/lib/superset/superset_config.py
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@datn_postgres:5432/superset?password=${POSTGRES_PASSWORD}
      - REDIS_HOST=datn_redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - superset_data:/var/lib/superset
      - ./superset/superset_config.py:/var/lib/superset/superset_config.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - datn_network

  # ---- PostgreSQL (Superset Metadata) ----
  postgres:
    image: postgres:15-alpine
    container_name: datn_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=superset
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datn_network

  # ---- Redis (Superset Cache) ----
  redis:
    image: redis:7-alpine
    container_name: datn_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - datn_network

  # ---- PostgreSQL Master (Multi-tenant Metadata) ----
  postgres_master:
    image: postgres:15-alpine
    container_name: datn_postgres_master
    environment:
      - POSTGRES_USER=${MASTER_DB_USER}
      - POSTGRES_PASSWORD=${MASTER_DB_PASSWORD}
      - POSTGRES_DB=${MASTER_DB_NAME:-DWH_Master}
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MASTER_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datn_network

  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: datn/backend:1.0.0
    container_name: datn_backend
    environment:
      - PYTHONPATH=/app
      - MASTER_DB_HOST=datn_postgres_master
      - MASTER_DB_PORT=5432
      - MASTER_DB_USER=${MASTER_DB_USER}
      - MASTER_DB_PASSWORD=${MASTER_DB_PASSWORD}
      - MASTER_DB_NAME=${MASTER_DB_NAME:-DWH_Master}
      - MSSQL_HOST=datn_mssql
      - MSSQL_PORT=1433
      - MSSQL_USER=sa
      - MSSQL_PASSWORD=${MSSQL_SA_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - UPLOAD_DIR=/app/uploads
      - SUPERSET_URL=http://datn_superset:8088
      - SUPERSET_ADMIN_USER=${SUPERSET_ADMIN_USER}
      - SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres_master:
        condition: service_healthy
      mssql:
        condition: service_started
    networks:
      - datn_network

  # ---- Frontend (React + Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: datn/frontend:1.0.0
    container_name: datn_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - datn_network

# ============================================================
# Networks & Volumes
# ============================================================
networks:
  datn_network:
    driver: bridge

volumes:
  mssql_data:
  superset_data:
  postgres_data:
  redis_data:
  postgres_master_data:
  backend_uploads:
