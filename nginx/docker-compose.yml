# ============================================================
# FILE: nginx/docker-compose.yml
# Mô tả: Docker Compose for Nginx + Certbot (Let's Encrypt HTTPS)
# Chạy: docker-compose -f nginx/docker-compose.yml up -d
# ============================================================

version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: dwh_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Config file
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

      # SSL certificates (mounted from host certbot directory)
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

      # Logs
      - ./logs/nginx:/var/log/nginx

    environment:
      - TZ=Asia/Ho_Chi_Minh

    depends_on:
      - api
      - frontend
      - superset

    restart: unless-stopped
    networks:
      - dwh_network

  # Certbot for Let's Encrypt SSL certificate renewal
  certbot:
    image: certbot/certbot:latest
    container_name: dwh_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

    # Run renewal check daily at 2 AM
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 86400 & wait $${!}; done;"

    restart: unless-stopped
    networks:
      - dwh_network

networks:
  dwh_network:
    driver: bridge

# ============================================================
# Manual SSL Setup (initial)
# ============================================================
# Before first run, execute:
#
#   mkdir -p certbot/{conf,www}
#
#   docker-compose -f nginx/docker-compose.yml run --rm certbot certonly \
#     --webroot \
#     -w /var/www/certbot \
#     -d dwh.company.com \
#     -d www.dwh.company.com \
#     --email admin@company.com \
#     --agree-tos \
#     --no-eff-email
#
# Then update docker-compose.yml to reference correct service names (api, frontend, superset)
# and rebuild the main docker-compose.yml to include this nginx service
# ============================================================
